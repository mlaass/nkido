name: Build and Deploy

on:
  push:
    branches: [master]
    tags:
      - 'v*'       # full release: deploys to prod AND creates a GitHub Release
      - 'web-v*'   # web-only deploy: deploys to prod, no GitHub Release

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required for softprops/action-gh-release to create releases

    steps:
      - uses: actions/checkout@v4

      - name: Extract release notes from CHANGELOG
        if: startsWith(github.ref, 'refs/tags/v')
        run: scripts/extract-changelog.sh "${GITHUB_REF_NAME#v}" > /tmp/release-notes.md

      - name: Detect tag kind
        id: tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          if [[ "$GITHUB_REF_NAME" == web-v* ]]; then
            echo "kind=web" >> "$GITHUB_OUTPUT"
          else
            echo "kind=full" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: '4.0.11'
          actions-cache-folder: 'emsdk-cache'

      - name: Build WASM
        run: |
          cd web/wasm
          emcmake cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Download SoundFonts
        run: web/scripts/download-soundfonts.sh

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install and build
        run: |
          cd web
          bun install
          bun run build

      - name: Deploy Dev
        if: github.ref == 'refs/heads/master'
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: './web/build'
          production-deploy: true
          deploy-message: "Dev: ${{ github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID_DEV }}

      - name: Deploy Production
        if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/web-v')
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: './web/build'
          production-deploy: true
          deploy-message: "${{ steps.tag.outputs.kind == 'web' && 'Web deploy' || 'Release' }}: ${{ github.ref_name }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID_PROD }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: /tmp/release-notes.md
